spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/recipedb
    username: recipeuser
    password: recipepass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080